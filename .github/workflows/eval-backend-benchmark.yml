name: Eval Backend Benchmark

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read

jobs:
  backend-benchmark:
    runs-on: ubuntu-latest
    env:
      EXTERNAL_APP_API_KEY: ci-eval-key
      RESXIV_GEMINI_API_KEY: ${{ secrets.RESXIV_GEMINI_API_KEY }}
      BACKEND_BASE_URL: http://127.0.0.1:8000
      BACKEND_EVAL_MANIFEST: .github/eval-fixtures/backend/benchmark_manifest.jsonl
      ARTIFACT_SUBDIR: backend-benchmark
      MIN_SUPPORT_RATE_MEAN: "0.68"
      MAX_HALLUCINATION_RATE_MEAN: "0.18"
      MIN_SOURCE_COVERAGE_PROXY_MEAN: "0.55"
      MIN_DELTA_SUPPORT_RATE_MEAN: "-0.08"
      MAX_DELTA_HALLUCINATION_RATE_MEAN: "0.08"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Gemini API key
        shell: bash
        run: |
          if [ -z "$RESXIV_GEMINI_API_KEY" ]; then
            echo "::error::Missing required secret: RESXIV_GEMINI_API_KEY (your Gemini API key)"
            exit 1
          fi

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq redis-server poppler-utils tesseract-ocr libcairo2-dev
          sudo systemctl start redis-server
          redis-cli ping

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Patch out saraldocling and install dependencies
        shell: bash
        run: |
          cd backend

          sed -i '/"saraldocling\[cpu\]"/d' pyproject.toml
          sed -i '/^\[tool\.uv\.sources\]/,$ { /saraldocling/d }' pyproject.toml

          mkdir -p /tmp/saraldocling_stub/saraldocling

          cat > /tmp/saraldocling_stub/pyproject.toml << 'STUBTOML'
          [project]
          name = "saraldocling"
          version = "0.0.1"
          dependencies = ["pymupdf>=1.26.0"]

          [build-system]
          requires = ["setuptools"]
          build-backend = "setuptools.build_meta"
          STUBTOML

          cat > /tmp/saraldocling_stub/saraldocling/__init__.py << 'STUBPY'
          """Minimal saraldocling stub for CI — uses PyMuPDF for PDF parsing."""
          from dataclasses import dataclass, field
          from pathlib import Path
          from typing import List
          import fitz


          @dataclass
          class ParseConfig:
              pdf_path: str = ""
              output_dir: str = ""
              extract_images: bool = False


          @dataclass
          class ParseResult:
              text: str = ""
              image_paths: List[str] = field(default_factory=list)
              num_pages: int = 0


          def parse_pdf(config: ParseConfig) -> ParseResult:
              pdf_path = Path(config.pdf_path)
              output_dir = Path(config.output_dir)
              output_dir.mkdir(parents=True, exist_ok=True)

              doc = fitz.open(str(pdf_path))
              text_parts = []
              image_paths = []

              for page_num, page in enumerate(doc):
                  text_parts.append(page.get_text())

                  if config.extract_images:
                      img_dir = output_dir / "extracted_images"
                      img_dir.mkdir(parents=True, exist_ok=True)
                      for img_index, img in enumerate(page.get_images(full=True)):
                          xref = img[0]
                          try:
                              pix = fitz.Pixmap(doc, xref)
                              if pix.n > 4:
                                  pix = fitz.Pixmap(fitz.csRGB, pix)
                              img_path = img_dir / f"page{page_num}_img{img_index}.png"
                              pix.save(str(img_path))
                              image_paths.append(str(img_path))
                          except Exception:
                              pass

              doc.close()

              return ParseResult(
                  text="\n".join(text_parts),
                  image_paths=image_paths,
                  num_pages=len(text_parts),
              )
          STUBPY

          uv sync
          uv pip install /tmp/saraldocling_stub --python .venv/bin/python

          echo "✓ Dependencies installed with saraldocling stub"

      - name: Generate dummy Firebase service account
        shell: bash
        run: |
          openssl genpkey -algorithm RSA -out /tmp/ci_dummy_key.pem \
            -pkeyopt rsa_keygen_bits:2048 2>/dev/null

          ESCAPED_KEY=$(awk '{printf "%s\\n", $0}' /tmp/ci_dummy_key.pem)

          cat > backend/firebase_service_account.json << JSONEOF
          {
            "type": "service_account",
            "project_id": "ci-dummy-project",
            "private_key_id": "ci-dummy-key-id",
            "private_key": "${ESCAPED_KEY}",
            "client_email": "ci-dummy@ci-dummy-project.iam.gserviceaccount.com",
            "client_id": "000000000000000000000",
            "auth_uri": "https://accounts.google.com/o/oauth2/auth",
            "token_uri": "https://oauth2.googleapis.com/token",
            "auth_provider_x509_cert_url": "https://www.googleapis.com/oauth2/v1/certs",
            "client_x509_cert_url": "https://www.googleapis.com/robot/v1/metadata/x509/ci-dummy%40ci-dummy-project.iam.gserviceaccount.com",
            "universe_domain": "googleapis.com"
          }
          JSONEOF

          rm /tmp/ci_dummy_key.pem
          python3 -c "import json; json.load(open('backend/firebase_service_account.json'))"
          echo "✓ Dummy Firebase service account written and validated"

      - name: Start backend server
        working-directory: backend
        shell: bash
        run: |
          nohup uv run uvicorn app.main:app --host 127.0.0.1 --port 8000 > ../backend-server.log 2>&1 &
          echo "Server PID: $!"
          sleep 10
          echo "=== Early server log ==="
          cat ../backend-server.log || true
          echo "========================"

      - name: Wait for backend health
        shell: bash
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8000/health > /dev/null; then
              echo "Backend is healthy after $((i*5)) seconds"
              exit 0
            fi
            sleep 5
          done
          echo "Backend failed to become healthy"
          echo "=== Full server log ==="
          cat backend-server.log || true
          exit 1

      - name: Run backend benchmark generation and evaluation
        working-directory: backend
        run: uv run python ../.github/scripts/run_backend_benchmark.py

      - name: Upload backend benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-backend-benchmark-artifacts
          path: |
            .github/eval-artifacts/backend-benchmark
            backend-server.log
